name: Deploy Production

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend and frontend
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          command_timeout: 40m
          script: |
            set -e

            (
              flock -n 9 || {
                echo "Another deployment is already running."
                exit 1
              }

              COMPOSE="docker compose --project-name car-dismantler --env-file .env.production -f docker-compose.production.yml"

              echo "===================================="
              echo "Updating Backend"
              echo "===================================="

              cd ~/car-dismantler/car-dismantler-be
              git fetch origin master
              git reset --hard origin/master

              echo "===================================="
              echo "Updating Frontend"
              echo "===================================="

              cd ~/car-dismantler/car-dismantler-fe
              git fetch origin master
              git reset --hard origin/master

              echo "===================================="
              echo "Building Docker Images"
              echo "===================================="

              cd ~/car-dismantler

              $COMPOSE build --no-cache

              echo "===================================="
              echo "Stopping Existing Containers"
              echo "===================================="

              $COMPOSE down --remove-orphans || true

              echo "===================================="
              echo "Removing Stale Temporary Containers"
              echo "===================================="

              docker ps -a \
                --format '{{.ID}} {{.Names}}' \
                | awk '$2 ~ /^[a-f0-9]+_car-dismantler-/ {print $1}' \
                | xargs -r docker rm -f

              echo "===================================="
              echo "Starting Fresh Containers"
              echo "===================================="

              $COMPOSE up -d --force-recreate --remove-orphans

              echo "Waiting for containers..."
              sleep 15

              echo "===================================="
              echo "Running Migrations and Seeders"
              echo "===================================="

              $COMPOSE exec -T backend-app \
                php artisan migrate --seed --force

              echo "===================================="
              echo "Clearing Laravel Cache"
              echo "===================================="

              $COMPOSE exec -T backend-app \
                php artisan optimize:clear

              echo "===================================="
              echo "Optimizing Laravel"
              echo "===================================="

              $COMPOSE exec -T backend-app \
                php artisan optimize

              echo "===================================="
              echo "Container Status"
              echo "===================================="

              $COMPOSE ps

              echo "===================================="
              echo "Backend Health Check"
              echo "===================================="

              curl \
                --fail \
                --retry 20 \
                --retry-delay 3 \
                --retry-connrefused \
                http://127.0.0.1:8081/api/test

              echo "===================================="
              echo "Removing Unused Docker Images"
              echo "===================================="

              docker image prune -f

              echo "===================================="
              echo "Deployment Completed Successfully"
              echo "===================================="

            ) 9>/tmp/car-dismantler-deploy.lock
            
